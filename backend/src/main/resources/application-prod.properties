spring.application.name=backend

# Database Configuration - Render provides DATABASE_URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.docker.compose.enabled=false

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.generate-ddl=false
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# CORS Configuration - Updated for Vercel frontend
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:https://oretech.vercel.app}

# =============================================================================
# STORAGE CONFIGURATION FOR PRODUCTION
# =============================================================================

# Storage Type - will be overridden by environment variable STORAGE_TYPE=s3
storage.type=${STORAGE_TYPE:s3}

# AWS S3 Configuration (for production)
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:rockops}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.enabled=${AWS_S3_ENABLED:true}
aws.s3.public-url=${AWS_S3_PUBLIC_URL:}

# Legacy MinIO Configuration (kept for backward compatibility)
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.publicUrl=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.accessKey=${MINIO_ACCESS_KEY:minioadmin}
minio.secretKey=${MINIO_SECRET_KEY:minioadmin}
minio.bucketName=${MINIO_BUCKET_NAME:rockops}

# =============================================================================

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

server.port=${PORT:8080}

# Memory optimization for constrained environments
spring.main.lazy-initialization=true
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.validation-timeout=3000
spring.datasource.hikari.leak-detection-threshold=30000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=false
spring.flyway.out-of-order=true
spring.flyway.locations=classpath:db/migration

# Graceful shutdown
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

# Logging - minimal in production
logging.level.com.example.backend=WARN
logging.level.org.hibernate.SQL=WARN
